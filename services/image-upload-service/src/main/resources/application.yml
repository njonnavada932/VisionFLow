spring:
  application:
    name: image-upload-service

  datasource:
    url: jdbc:postgresql://localhost:5432/visionflow?options=-c%20TimeZone=Asia/Kolkata
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8081

storage:
  provider: local
  upload-path: uploads/

logging:
  level:
    root: INFO
