version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: visionflow-postgres

    environment:
      POSTGRES_DB: visionflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped
  pgadmin:
    image: dpage/pgadmin4
    container_name: visionflow-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@visionflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    restart: unless-stopped
volumes:
  postgres_data:
